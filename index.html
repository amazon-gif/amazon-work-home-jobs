<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
body { margin:0; background:#000; font-family:Arial; }
.post { height:100vh; position:relative; }
img { width:100%; height:100%; object-fit:cover; }

.overlay {
 position:absolute;
 bottom:80px;
 left:15px;
 color:white;
}

.cta {
 position:absolute;
 bottom:20px;
 right:15px;
}

button {
 padding:12px;
 border:none;
 color:white;
 border-radius:10px;
 font-weight:bold;
}

.topbar {
 position:fixed;
 top:0;
 width:100%;
 text-align:center;
 padding:10px;
 color:white;
 background:rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="topbar">For You 🔥</div>

<div class="post">
<img src="https://picsum.photos/500/900">

<div class="overlay">
<b>@trend</b><br>
<span id="caption"></span>
</div>

<div class="cta">
<button id="ctaBtn">Loading...</button>
</div>
</div>

<script>
const UI = {
 A: {
  caption: ["You won’t believe this 😳","Wait for it... 🤯"],
  button: "Watch Now",
  color: "#ff0050"
 },
 B: {
  caption: ["This shocked everyone 😱","Don’t scroll 😲"],
  button: "Open Video",
  color: "#00c2ff"
 }
};

let variant, link, geo;

async function init(){
 const res = await fetch("/variant");
 const data = await res.json();

 variant = data.variant;
 link = data.link;
 geo = data.geo;

 const cfg = UI[variant];

 document.getElementById("caption").innerText =
  cfg.caption[Math.floor(Math.random()*cfg.caption.length)];

 const btn = document.getElementById("ctaBtn");
 btn.innerText = cfg.button;
 btn.style.background = cfg.color;

 btn.onclick = go;
}

function go(){
 fetch(`/click?v=${variant}&geo=${geo}`).catch(()=>{});
 window.open(link, "_blank");
}

init();
</script>

</body>
</html>
